<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UCT ERP | Universidade Católica</title>
    <link rel="icon" type="image/jpeg" href="/uct-logo.png.jpeg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Nunito+Sans:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />
    <style>
      @media print {
        /* Hide sidebar, header, nav, action buttons when printing */
        .sidebar, .main-header, .breadcrumb, .tbl-btn, .hostel-tbl-tool-btn,
        .submit-btn, nav, header, [class*="sidebar"], [class*="header"],
        button:not(.print-visible) { display: none !important; }
        /* Remove page background, show content full width */
        body { background: #fff !important; margin: 0 !important; }
        .main-content, #root > * { width: 100% !important; padding: 0 !important; }
      }
    </style>
  </head>
  <body style="margin:0;padding:0;">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
